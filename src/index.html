<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pop # Popover Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="center-container">
    <button
      class="popover-trigger"
      data-toggle="popover"
      data-title="Заголовок всплывающего окна"
      data-content="И вот какой-то потрясающий контент. Очень увлекательно, правда?">
      Нажми, чтобы показать Popover
    </button>
    </div>
  <script src="script.js"></script>
</body>
</html>
